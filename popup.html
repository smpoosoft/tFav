<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>tFav 设置</title>
<style>
  body { width: 260px; font-family: system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; padding: 16px; color: #202124; }
  h1 { font-size: 15px; margin: 0 0 12px; color: #F5A623; }
  label { display: block; font-size: 12px; color: #5f6368; margin: 10px 0 4px; }
  select, input[type="text"] { width: 100%; box-sizing: border-box; padding: 6px 8px; border: 1px solid #dadce0; border-radius: 5px; font-size: 13px; }
  button { margin-top: 14px; width: 100%; padding: 8px; background: #F5A623; color: #fff; border: none; border-radius: 5px; font-size: 13px; font-weight: 600; cursor: pointer; }
  button:hover { background: #E8941A; }
  #status { margin-top: 8px; font-size: 12px; color: #188038; min-height: 14px; }
  .hint { font-size: 11px; color: #9aa0a6; margin-top: 4px; }
</style>
</head>
<body>
  <h1>tFav 设置</h1>

  <label for="themeSelect">主题</label>
  <select id="themeSelect">
    <option value="auto">跟随系统</option>
    <option value="light">亮色</option>
    <option value="dark">暗色</option>
  </select>

  <label>
    <input type="checkbox" id="includePinned">
    收起时包含固定标签页
  </label>

  <button id="saveBtn">保存</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
